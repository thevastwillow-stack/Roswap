name: Build Roswap

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # avoid Node.js 20 warnings

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.13'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install nuitka

    # --- Compiler setup ---
    - name: Install Windows Build Tools
      if: matrix.os == 'windows-latest'
      run: |
        choco install visualstudio2019buildtools --package-parameters "--add Microsoft.VisualStudio.Component.VC.Tools.x86.x64 --quiet --norestart"
      shell: powershell

    - name: Install Linux build tools
      if: matrix.os == 'ubuntu-latest'
      run: sudo apt update && sudo apt install -y build-essential python3-dev

    - name: Install macOS Xcode Command Line Tools
      if: matrix.os == 'macos-latest'
      run: xcode-select --install || true

    # --- Compile with Nuitka ---
    - name: Compile with Nuitka
      run: |
        if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
          python -m nuitka --onefile main.py
        else
          python3 -m nuitka --onefile main.py
        fi
      shell: bash

    # --- Upload build artifacts ---
    - name: Upload build
      uses: actions/upload-artifact@v4
      with:
        name: Roswap-${{ matrix.os }}
        path: |
          main.exe
          main