name: Build Roswap

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'
        cache: pip

    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: '21'

    - name: Install dependencies (Windows)
      if: matrix.os == 'windows-latest'
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Install dependencies (Linux / macOS)
      if: matrix.os != 'windows-latest'
      shell: bash
      run: |
        python -m pip install --upgrade pip
        grep -v "pywin32" requirements.txt | pip install -r /dev/stdin

    - name: Install Linux build tools
      if: matrix.os == 'ubuntu-latest'
      run: sudo apt update && sudo apt install -y build-essential python3-dev patchelf

    - name: Install macOS build tools
      if: matrix.os == 'macos-latest'
      run: xcode-select --install || true

    - name: Bundle JRE (Windows)
      if: matrix.os == 'windows-latest'
      shell: bash
      run: |
        curl -L "https://github.com/adoptium/temurin21-binaries/releases/download/jdk-21.0.5%2B11/OpenJDK21U-jre_x64_windows_hotspot_21.0.5_11.zip" -o jre.zip
        unzip -q jre.zip
        mv jdk-21.0.5+11-jre jre

    - name: Bundle JRE (Linux)
      if: matrix.os == 'ubuntu-latest'
      run: |
        curl -L "https://github.com/adoptium/temurin21-binaries/releases/download/jdk-21.0.5%2B11/OpenJDK21U-jre_x64_linux_hotspot_21.0.5_11.tar.gz" -o jre.tar.gz
        tar -xzf jre.tar.gz
        mv jdk-21.0.5+11-jre jre

    - name: Bundle JRE (macOS)
      if: matrix.os == 'macos-latest'
      run: |
        curl -L "https://github.com/adoptium/temurin21-binaries/releases/download/jdk-21.0.5%2B11/OpenJDK21U-jre_x64_mac_hotspot_21.0.5_11.tar.gz" -o jre.tar.gz
        tar -xzf jre.tar.gz
        mv jdk-21.0.5+11-jre/Contents/Home jre

    # Use `find` instead of `python -c "import py5..."` to avoid the headless
    # JVM crash. py5 raises RuntimeError on import in a headless CI environment.
    - name: Strip foreign py5 natives (Windows)
      if: matrix.os == 'windows-latest'
      shell: bash
      run: |
        PY5_NATIVES=$(find $RUNNER_TOOL_CACHE -path "*/py5/natives" -type d 2>/dev/null || find /c -path "*/py5/natives" -type d 2>/dev/null || python -c "import site; print([p for p in __import__('glob').glob(p+'/**/py5/natives', recursive=True) for p in __import__('site').getsitepackages()][0])" 2>/dev/null || true)
        if [ -z "$PY5_NATIVES" ]; then
          PY5_NATIVES=$(find / -path "*/py5/natives" -type d 2>/dev/null | head -1)
        fi
        echo "py5 natives at: $PY5_NATIVES"
        rm -rf "$PY5_NATIVES/android-aarch64" "$PY5_NATIVES/android-armv6"
        rm -rf "$PY5_NATIVES/linux-amd64" "$PY5_NATIVES/linux-armv6hf" "$PY5_NATIVES/linux-aarch64"
        rm -rf "$PY5_NATIVES/macosx-universal"

    - name: Strip foreign py5 natives (Linux)
      if: matrix.os == 'ubuntu-latest'
      run: |
        PY5_NATIVES=$(find / -path "*/py5/natives" -type d 2>/dev/null | head -1)
        echo "py5 natives at: $PY5_NATIVES"
        rm -rf "$PY5_NATIVES/android-aarch64" "$PY5_NATIVES/android-armv6"
        rm -rf "$PY5_NATIVES/macosx-universal"
        rm -rf "$PY5_NATIVES/windows-amd64"

    - name: Strip foreign py5 natives (macOS)
      if: matrix.os == 'macos-latest'
      run: |
        PY5_NATIVES=$(find / -path "*/py5/natives" -type d 2>/dev/null | head -1)
        echo "py5 natives at: $PY5_NATIVES"
        rm -rf "$PY5_NATIVES/android-aarch64" "$PY5_NATIVES/android-armv6"
        rm -rf "$PY5_NATIVES/linux-amd64" "$PY5_NATIVES/linux-armv6hf" "$PY5_NATIVES/linux-aarch64"
        rm -rf "$PY5_NATIVES/windows-amd64"

    - name: Build with Nuitka
      uses: Nuitka/Nuitka-Action@main
      with:
        nuitka-version: main
        script-name: main.py
        mode: app
        include-package: |
          py5
          jpype
          core
          engine
          maze
          rooms
          ui
        include-package-data: py5
        include-data-dir: jre=jre
        macos-app-icon: none

    - name: Upload build (Windows)
      if: matrix.os == 'windows-latest'
      uses: actions/upload-artifact@v4
      with:
        name: Roswap-windows
        path: build/*.exe
        include-hidden-files: true

    - name: Upload build (Linux)
      if: matrix.os == 'ubuntu-latest'
      uses: actions/upload-artifact@v4
      with:
        name: Roswap-linux
        path: build/*.bin
        include-hidden-files: true

    - name: Upload build (macOS)
      if: matrix.os == 'macos-latest'
      uses: actions/upload-artifact@v4
      with:
        name: Roswap-macos
        path: build/*.app/**/*
        include-hidden-files: true