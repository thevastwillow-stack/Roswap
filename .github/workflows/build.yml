name: Build Roswap

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'

    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: '21'

    - name: Install dependencies (Windows)
      if: matrix.os == 'windows-latest'
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install "nuitka[onefile]"

    - name: Install dependencies (Linux / macOS)
      if: matrix.os != 'windows-latest'
      run: |
        python -m pip install --upgrade pip
        grep -v "pywin32" requirements.txt | pip install -r /dev/stdin
        pip install "nuitka[onefile]"

    - name: Install Linux build tools
      if: matrix.os == 'ubuntu-latest'
      run: sudo apt update && sudo apt install -y build-essential python3-dev patchelf

    - name: Install macOS build tools
      if: matrix.os == 'macos-latest'
      run: xcode-select --install || true

    - name: Bundle JRE (Windows)
      if: matrix.os == 'windows-latest'
      shell: bash
      run: |
        curl -L "https://github.com/adoptium/temurin21-binaries/releases/download/jdk-21.0.5%2B11/OpenJDK21U-jre_x64_windows_hotspot_21.0.5_11.zip" -o jre.zip
        unzip -q jre.zip
        mv jdk-21.0.5+11-jre jre

    - name: Bundle JRE (Linux)
      if: matrix.os == 'ubuntu-latest'
      run: |
        curl -L "https://github.com/adoptium/temurin21-binaries/releases/download/jdk-21.0.5%2B11/OpenJDK21U-jre_x64_linux_hotspot_21.0.5_11.tar.gz" -o jre.tar.gz
        tar -xzf jre.tar.gz
        mv jdk-21.0.5+11-jre jre

    - name: Bundle JRE (macOS)
      if: matrix.os == 'macos-latest'
      run: |
        curl -L "https://github.com/adoptium/temurin21-binaries/releases/download/jdk-21.0.5%2B11/OpenJDK21U-jre_x64_mac_hotspot_21.0.5_11.tar.gz" -o jre.tar.gz
        tar -xzf jre.tar.gz
        mv jdk-21.0.5+11-jre/Contents/Home jre

    # Delete py5 native libs that don't belong on the current platform.
    # Nuitka validates every file it finds before --noinclude-data-files runs,
    # so we must remove them from disk first.
    - name: Strip foreign py5 natives (Windows)
      if: matrix.os == 'windows-latest'
      shell: bash
      run: |
        PY5_NATIVES=$(python -c "import py5, os; print(os.path.join(os.path.dirname(py5.__file__), 'natives'))")
        rm -rf "$PY5_NATIVES/android-aarch64"
        rm -rf "$PY5_NATIVES/android-armv6"
        rm -rf "$PY5_NATIVES/linux-amd64"
        rm -rf "$PY5_NATIVES/linux-armv6hf"
        rm -rf "$PY5_NATIVES/macosx-universal"

    - name: Strip foreign py5 natives (Linux)
      if: matrix.os == 'ubuntu-latest'
      run: |
        PY5_NATIVES=$(python3 -c "import py5, os; print(os.path.join(os.path.dirname(py5.__file__), 'natives'))")
        rm -rf "$PY5_NATIVES/android-aarch64"
        rm -rf "$PY5_NATIVES/android-armv6"
        rm -rf "$PY5_NATIVES/macosx-universal"
        rm -rf "$PY5_NATIVES/windows-amd64"

    - name: Strip foreign py5 natives (macOS)
      if: matrix.os == 'macos-latest'
      run: |
        PY5_NATIVES=$(python3 -c "import py5, os; print(os.path.join(os.path.dirname(py5.__file__), 'natives'))")
        rm -rf "$PY5_NATIVES/android-aarch64"
        rm -rf "$PY5_NATIVES/android-armv6"
        rm -rf "$PY5_NATIVES/linux-amd64"
        rm -rf "$PY5_NATIVES/linux-armv6hf"
        rm -rf "$PY5_NATIVES/windows-amd64"

    - name: Compile with Nuitka (Windows)
      if: matrix.os == 'windows-latest'
      run: >
        python -m nuitka
        --onefile
        --assume-yes-for-downloads
        --output-filename=main.exe
        --include-package=py5
        --include-package=jpype
        --include-package-data=py5
        --include-package=core
        --include-package=engine
        --include-package=maze
        --include-package=rooms
        --include-package=ui
        --include-data-dir=jre=jre
        main.py

    - name: Compile with Nuitka (Linux)
      if: matrix.os == 'ubuntu-latest'
      run: >
        python3 -m nuitka
        --onefile
        --assume-yes-for-downloads
        --output-filename=main.bin
        --include-package=py5
        --include-package=jpype
        --include-package-data=py5
        --include-package=core
        --include-package=engine
        --include-package=maze
        --include-package=rooms
        --include-package=ui
        --include-data-dir=jre=jre
        main.py

    - name: Compile with Nuitka (macOS)
      if: matrix.os == 'macos-latest'
      run: >
        python3 -m nuitka
        --mode=app
        --assume-yes-for-downloads
        --output-filename=main.app
        --macos-app-icon=none
        --include-package=py5
        --include-package=jpype
        --include-package-data=py5
        --include-package=core
        --include-package=engine
        --include-package=maze
        --include-package=rooms
        --include-package=ui
        --include-data-dir=jre=jre
        main.py

    - name: Upload build (Windows)
      if: matrix.os == 'windows-latest'
      uses: actions/upload-artifact@v4
      with:
        name: Roswap-windows
        path: main.exe

    - name: Upload build (Linux)
      if: matrix.os == 'ubuntu-latest'
      uses: actions/upload-artifact@v4
      with:
        name: Roswap-linux
        path: main.bin

    - name: Upload build (macOS)
      if: matrix.os == 'macos-latest'
      uses: actions/upload-artifact@v4
      with:
        name: Roswap-macos
        path: main.app